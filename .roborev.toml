display_name = "kata"

review_guidelines = """
Latest stable Go. Be pragmatic — theoretical findings produce churn.

## Don't assert external facts you cannot verify

You see only the diff and have no network access. Don't claim a pinned
version, SHA, or URL "doesn't exist". If a maintainer pinned `v2.10.1`
with a SHA, that pin is the source of truth. Flag only concrete
breaking changes visible in the diff. Otherwise phrase as a LOW-severity
question, not a Medium/High "fix".

## Trust model — single-user local tool

Daemon binds to Unix socket or loopback TCP only (`requireLoopback` in
`internal/daemon/endpoint.go`). Multi-user auth is out of scope per
`docs/superpowers/specs/2026-04-29-kata-design.md`. The OS user IS the
trust boundary.

Not findings: missing API auth, `validateActor` "not authorizing"
(it's audit metadata), DoS via large bodies / bulk endpoints / unbounded
loops on local input, symlink-following under the kata data dir, races
visible only to a colocated attacker.

## Schema upgrades use JSONL cutover, not ALTER-TABLE migrations

Schema lives in the embedded `internal/db/schema.sql`. There is no
migrations directory; `db.Open` returns `ErrSchemaCutoverRequired`
when versions mismatch, and `jsonl.AutoCutover` rebuilds the DB from
JSONL into a fresh current-schema bootstrap.

Bumping the version: edit `schema.sql`. For shape changes (added /
removed / retyped columns), add a version-aware exporter for the old
shape in `internal/jsonl/export.go` and make the importer tolerant of
the missing field. For CHECK widenings, no exporter is needed — old
rows still satisfy the wider constraint after the rebuild.

Don't flag "missing migration file" or "the existing DB keeps the old
CHECK". No DDL script would run, and every old DB is torn down and
rebuilt by JSONL cutover.

## Pre-transaction close guards: accepted v1 trade-off

`CheckSiblingCloseThrottle` and `CheckRepeatedMessageGuard` in
`internal/daemon/close_guards.go` read before `db.CloseIssue`'s write
tx, so concurrent closes can momentarily exceed the limit by one. The
spec documents this (anti-agent-justification §3.9); agents are
typically serial and the next close in the window still trips the
guard and emits `close.throttled`. Don't re-raise — if a real attack
path exists, name it concretely.

## TUI close bypass: intentional trust-on-claim, scoped to reason=done

`internal/daemon/handlers_actions.go` skips substance/evidence
validation only when `source == "tui"` AND `reason == "done"` (the
only shape the interactive close keystroke produces). A TUI claim
with any other reason still runs full validation, including
duplicate-of / superseded-by target checks. Forging the source field
on a `done` close costs the same as forging evidence — adding a
server-issued capability only inconveniences honest callers. Audit
still flags `no-evidence` closes; structural guards still run. Don't
recommend a separate endpoint or capability token; if you find a
check that should run for TUI but doesn't, raise *that* check.

## Project archival

`projects.deleted_at != NULL` = archived. Surface reads filter at the
query (`ListProjects`, `ListAllIssues`); callers needing archived rows
use `*IncludingArchived` variants. `ProjectByID` returns archived rows
on purpose so merge / restore can see them. Verify the actual query
before flagging `ProjectByID` or claiming `ListAllIssues` leaks
archived data.
"""
